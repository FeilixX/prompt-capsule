<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <title>Prompt Tape</title>
  <rect x="2" y="2" width="60" height="60" rx="11" fill="#f4efe1"/>
  <!-- cassette shell -->
  <rect x="7" y="15" width="50" height="34" rx="5" fill="#201d1a" stroke="#1c1a17" stroke-width="2"/>
  <!-- label: cream / yellow / red stripes -->
  <rect x="12" y="19" width="40" height="9" fill="#faf6ec"/>
  <rect x="12" y="28" width="40" height="6" fill="#f4c22b"/>
  <rect x="12" y="34" width="40" height="9" fill="#e5352b"/>
  <!-- centre window + reels -->
  <rect x="27" y="28" width="10" height="9" fill="#201d1a"/>
  <circle cx="20" cy="33" r="5" fill="#fffdf7" stroke="#201d1a" stroke-width="2"/>
  <circle cx="44" cy="33" r="5" fill="#fffdf7" stroke="#201d1a" stroke-width="2"/>
  <circle cx="20" cy="33" r="1.6" fill="#201d1a"/>
  <circle cx="44" cy="33" r="1.6" fill="#201d1a"/>
</svg>
